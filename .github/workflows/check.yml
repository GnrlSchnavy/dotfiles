name: fresh-install test

# End-to-end test that mirrors what `./setup.sh` does on a real Mac:
# install Nix, then `darwin-rebuild switch` against the `ci` host
# descriptor (matches the runner's environment). Catches eval errors,
# build failures, activation script errors, home-manager activation
# issues, and brew-bundle issues — the full surface area we'd
# otherwise only discover by running setup on a fresh machine.
#
# The `ci` host skips casks (some have DSL incompatibilities specific
# to the macos-15 runner image) and disables homebrew zap/upgrade,
# keeping runs to ~10-15 min while still exercising the full path.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  fresh-install:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          # GITHUB_TOKEN gives us a higher rate limit when nix fetches
          # flake inputs from github.com (otherwise we share an
          # anonymous IP pool and 403 quickly).
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            trusted-users = root runner
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Use the public Nix cache
        # Pull from nix-community for nixvim/home-manager artifacts that
        # aren't on cache.nixos.org. Cuts a few minutes off cold runs.
        uses: cachix/cachix-action@v17
        with:
          name: nix-community
          skipPush: true

      - name: Move pre-existing /etc files out of the way
        # nix-darwin refuses to overwrite files it doesn't manage. The
        # runner has /etc/nix/nix.conf, /etc/bashrc, /etc/zshrc from
        # the Nix install; rename them so activation can take over.
        # On a real fresh Mac, setup.sh does this same step.
        run: |
          for f in /etc/nix/nix.conf /etc/bashrc /etc/zshrc; do
            if [ -f "$f" ] && [ ! -f "$f.before-nix-darwin" ]; then
              sudo mv "$f" "$f.before-nix-darwin"
            fi
          done

      - name: Apply darwin configuration end-to-end
        # Bootstrap nix-darwin and apply our `ci` host config in one
        # shot — same path setup.sh takes, just with the runner's
        # pre-installed Homebrew and Nix already in place.
        #
        # sudo because nix-darwin's activation step requires root.
        #
        # access-tokens is passed via --option (not env / nix.conf)
        # because:
        #   - the previous step moved /etc/nix/nix.conf aside so
        #     nix-darwin can take it over, dropping the install-nix-action
        #     access-tokens we configured there
        #   - sudo runs as root which falls back to /var/root for HOME,
        #     so user-level ~/.config/nix/nix.conf isn't read
        # Passing on the command line bypasses both issues.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo nix run \
            --extra-experimental-features "nix-command flakes" \
            --option access-tokens "github.com=${GH_TOKEN}" \
            "github:LnL7/nix-darwin/nix-darwin-25.11#darwin-rebuild" -- \
            switch --flake ./nix#ci

      - name: Verify activation produced the expected symlinks
        run: |
          set -euo pipefail

          # nix-darwin's profile and home-manager's profile aren't on
          # PATH yet — that happens in new shells via the activation
          # script's PATH manipulation. Explicitly prepend so this
          # bash step can see the binaries it just installed.
          export PATH="/run/current-system/sw/bin:/etc/profiles/per-user/runner/bin:$PATH"

          fail() { echo "::error::$1"; exit 1; }

          # home-manager managed shell files
          [ -L ~/.zshrc ]    || fail "~/.zshrc is not a symlink"
          [ -L ~/.zprofile ] || fail "~/.zprofile is not a symlink"
          [ -L ~/.zshenv ]   || fail "~/.zshenv is not a symlink"

          # home-manager managed git config (XDG)
          [ -L ~/.config/git/config ] || fail "~/.config/git/config is not a symlink"
          [ -L ~/.config/git/ignore ] || fail "~/.config/git/ignore is not a symlink"

          # home-manager file-pointer dotfiles
          [ -L ~/.ideavimrc ]                     || fail "~/.ideavimrc is not a symlink"
          [ -L ~/.docker/config.json ]            || fail "~/.docker/config.json is not a symlink"
          [ -L ~/.claude/settings.local.json ]    || fail "~/.claude/settings.local.json is not a symlink"

          # darwin-rebuild ships in the system profile
          command -v darwin-rebuild >/dev/null || fail "darwin-rebuild not on PATH"

          # Brew bundle should have left every declared formula installed
          command -v brew >/dev/null || fail "brew not on PATH"
          for formula in jenv pyenv kubectl helm; do
            brew list --formula "$formula" >/dev/null 2>&1 || fail "brew formula $formula missing after activation"
          done

          echo "All smoke checks passed."
